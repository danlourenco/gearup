version: 1
name: base
description: "Homebrew, core CLI tools, and standard desktop apps"

steps:
  - name: Homebrew
    type: curl-pipe-sh
    url: https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh
    check: command -v brew

  - name: Git
    type: brew
    formula: git
    check: command -v git

  - name: jq
    type: brew
    formula: jq

  - name: iTerm2
    type: brew-cask
    cask: iterm2

  - name: Bruno
    type: brew-cask
    cask: bruno
