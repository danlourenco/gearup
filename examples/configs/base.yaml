version: 1
name: base
description: "Homebrew, core CLI tools, and standard desktop apps"

steps:
  - name: Homebrew
    type: curl-pipe-sh
    url: https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh
    check: command -v brew

  - name: Git
    type: brew
    formula: git
    check: command -v git

  - name: jq
    type: brew
    formula: jq

  # Desktop apps — check /Applications/ so we skip if installed
  # from any source (brew, direct download, MDM, etc.)
  - name: iTerm2
    type: brew-cask
    cask: iterm2
    check: test -d "/Applications/iTerm.app"

  - name: Bruno
    type: brew-cask
    cask: bruno
    check: test -d "/Applications/Bruno.app"
