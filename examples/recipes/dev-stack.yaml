version: 1
name: dev-stack
description: "Full macOS developer toolchain: Homebrew, core CLI tools, JVM, containers, AWS, K8s, Node"

steps:
  - name: Homebrew
    type: curl-pipe-sh
    url: https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh
    check: command -v brew

  # Git is commonly pre-installed from Xcode Command Line Tools.
  # The availability check avoids installing a duplicate via brew.
  - name: Git
    type: brew
    formula: git
    check: command -v git

  - name: OpenJDK 21
    type: brew
    formula: openjdk@21

  # Docker CLI is commonly pre-installed from Docker Desktop.
  - name: Docker CLI
    type: brew
    formula: docker
    check: command -v docker

  # Docker Compose v2 installed as a Docker CLI plugin, per
  # https://docs.docker.com/compose/install/ "Install the plugin manually".
  # This is the path for environments that can't use Docker Desktop (licensing)
  # and run an alternative runtime like Colima.
  - name: Docker Compose (CLI plugin)
    type: shell
    check: docker compose version >/dev/null 2>&1
    install: |
      set -euo pipefail
      DOCKER_CONFIG="${DOCKER_CONFIG:-$HOME/.docker}"
      mkdir -p "$DOCKER_CONFIG/cli-plugins"
      curl -fsSL \
        "https://github.com/docker/compose/releases/download/v2.32.4/docker-compose-$(uname -s | tr '[:upper:]' '[:lower:]')-$(uname -m)" \
        -o "$DOCKER_CONFIG/cli-plugins/docker-compose"
      chmod +x "$DOCKER_CONFIG/cli-plugins/docker-compose"

  - name: Colima
    type: brew
    formula: colima

  - name: AWS CLI
    type: brew
    formula: awscli

  - name: aws-iam-authenticator
    type: brew
    formula: aws-iam-authenticator

  # Canonical brew formula is kubernetes-cli; `kubectl` is an install-time alias
  # that breaks idempotency for `brew list --formula`. Use the canonical name.
  - name: kubectl
    type: brew
    formula: kubernetes-cli

  - name: jq
    type: brew
    formula: jq

  - name: nvm
    type: curl-pipe-sh
    url: https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.4/install.sh
    check: '[ -s "$HOME/.nvm/nvm.sh" ]'
