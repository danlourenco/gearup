name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Smoke test the compiled binary
        run: |
          bun build src/cli.ts --compile --outfile=bin/gearup --external=giget
          ./bin/gearup --help
          ./bin/gearup plan --config tests/fixtures/single-brew.jsonc || EXIT=$?
          # plan exits 0 or 10 — both are acceptable
          if [ "${EXIT:-0}" != "0" ] && [ "${EXIT:-0}" != "10" ]; then
            echo "unexpected exit code: $EXIT"
            exit 1
          fi
