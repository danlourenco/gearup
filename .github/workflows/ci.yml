name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - run: go test ./...

      - run: go vet ./...

      - name: Build
        run: go build -o gearup ./cmd/gearup

      - name: Smoke test
        run: |
          EXIT_CODE=0
          ./gearup plan --config ./examples/configs/frontend.yaml || EXIT_CODE=$?
          if [ "$EXIT_CODE" -ne 0 ] && [ "$EXIT_CODE" -ne 10 ]; then
            echo "unexpected exit code: $EXIT_CODE"
            exit 1
          fi
