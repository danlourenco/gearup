version: 1
name: containers
description: "Local container runtime + tooling (Docker CLI, Compose plugin, Colima)"

steps:
  - name: Docker CLI
    type: brew
    formula: docker
    check: command -v docker

  - name: Docker Compose (CLI plugin)
    type: shell
    check: docker compose version >/dev/null 2>&1
    install: |
      set -euo pipefail
      DOCKER_CONFIG="${DOCKER_CONFIG:-$HOME/.docker}"
      mkdir -p "$DOCKER_CONFIG/cli-plugins"
      ARCH="$(uname -m | sed 's/arm64/aarch64/')"
      curl -fsSL \
        "https://github.com/docker/compose/releases/download/v2.32.4/docker-compose-$(uname -s | tr '[:upper:]' '[:lower:]')-${ARCH}" \
        -o "$DOCKER_CONFIG/cli-plugins/docker-compose"
      chmod +x "$DOCKER_CONFIG/cli-plugins/docker-compose"

  - name: Colima
    type: brew
    formula: colima
